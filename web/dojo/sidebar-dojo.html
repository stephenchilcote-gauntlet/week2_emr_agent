<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clinical Assistant — Dojo</title>
  <link rel="stylesheet" href="../sidebar/sidebar.css" />
  <style>
    .sidebar { width: 100%; }
    .dojo-notice {
      padding: 24px 16px; color: var(--text-muted); font-size: 13px;
      text-align: center; line-height: 1.6;
    }
    .dojo-notice code {
      background: rgba(0,0,0,0.06); padding: 1px 5px; border-radius: 4px;
      font-family: ui-monospace, monospace; font-size: 0.9em;
    }
    .dojo-badge {
      font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px;
      text-transform: uppercase; letter-spacing: 0.04em;
      background: #FEF3C7; color: #92400e; margin-left: 6px;
    }
  </style>
</head>
<body>
  <aside class="sidebar" id="sidebar-root">
    <header class="sidebar-header">
      <div class="title-row">
        <span class="header-title">Clinical Assistant<span class="dojo-badge">Dojo</span></span>
      </div>
      <div class="context-bar">
        <div class="context-row" id="context-line">No patient selected</div>
        <div class="status-pill" id="status-pill" data-state="ready" aria-live="polite">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-text">Ready</span>
        </div>
      </div>
    </header>

    <main class="chat-shell" id="chat-shell">
      <section id="chat-area" class="chat-area" aria-live="polite">
        <div class="dojo-notice">
          Click a manifest to populate this review panel.<br>
          Use <code>✓</code> <code>✗</code> <code>‹</code> <code>›</code> on overlay rows or the buttons below.
        </div>
      </section>
    </main>

    <section id="review-panel" class="review-panel hidden">
      <div class="review-header">
        <div class="review-tour-nav">
          <button id="tour-prev" class="tour-arrow" title="Previous item" disabled>‹</button>
          <span id="tour-progress" class="tour-progress">1 of 1</span>
          <button id="tour-next" class="tour-arrow" title="Next item" disabled>›</button>
        </div>
        <div class="review-header-actions">
          <button id="apply-all" class="btn-sm btn-accent">Apply All</button>
          <button id="reject-all" class="btn-sm btn-muted">Reject All</button>
        </div>
      </div>
      <div id="review-cards" class="review-cards"></div>
      <div class="review-footer">
        <span id="review-summary">No pending changes.</span>
        <button id="execute-button" class="btn-sm btn-accent">Execute Changes</button>
      </div>
    </section>
  </aside>

  <script>
  // ═══════════════════════════════════════════════════════════════
  // Dojo Sidebar — stripped-down SidebarApp for testing overlays.
  // Faithfully replicates the review panel from sidebar.js but
  // replaces all API calls with local state updates.
  // ═══════════════════════════════════════════════════════════════

  // ── Constants (copied from sidebar.js) ──

  var RESOURCE_DISPLAY_NAMES = {
    Condition: "Medical Problems",
    AllergyIntolerance: "Allergies",
    MedicationRequest: "Medications",
    Encounter: "Encounters",
    Observation: "Vitals/Observations",
    Vital: "Vitals",
    SoapNote: "SOAP Note",
    Procedure: "Procedures",
    DiagnosticReport: "Reports",
  }

  var ACTION_LABELS = { create: "Add", update: "Update", delete: "Remove" }

  var VALUE_FIELD_LABELS = {
    ref: null, status: "Status", title: "Name", code: "Code",
    code_text: "Description", display: "Description", drug: "Medication",
    dose: "Dose", route: "Route", freq: "Frequency", begdate: "Start date",
    enddate: "End date", severity: "Severity", reaction: "Reaction",
    onset: "Onset", type: "Type", outcome: "Outcome", occurrence: "Occurrence",
    note: "Notes", document: "Note text", text: "Note text",
    verification: "Verification", clinical_status: "Clinical status",
    category: "Category", subjective: "Subjective", objective: "Objective",
    assessment: "Assessment", plan: "Plan", reason: "Reason",
    facility: "Facility", date: "Date", onset_date: "Onset Date",
    sensitivity: null, pc_catid: null, bps: "Systolic BP", bpd: "Diastolic BP",
    weight: "Weight", height: "Height", temperature: "Temperature",
    temp_method: null, pulse: "Pulse", respiration: "Respiration",
    oxygen_saturation: "O\u2082 Sat", waist_circ: "Waist", head_circ: "Head Circ",
  }

  var VERIFICATION_LABELS = {
    grounding: { name: "Source", passedMsg: "Source verified in patient record" },
    confidence: { name: "Clarity", passedMsg: "Recommendation is clearly stated" },
    conflict: { name: "Conflicts", passedMsg: "No conflicts with current record" },
    constraint_icd10: { name: "Diagnosis Code", passedMsg: null },
    constraint_cpt: { name: "Procedure Code", passedMsg: null },
    constraint_document_sections: { name: "Document", passedMsg: null },
    medication_high_risk: { name: "Safety", passedMsg: null },
    medication_required_fields: { name: "Required Info", passedMsg: null },
    medication_duplicate: { name: "Duplicates", passedMsg: null },
    medication_allergy: { name: "Allergy Check", passedMsg: null },
  }

  // ── Helper functions (copied from sidebar.js) ──

  function humanizeFieldValue(key, value) {
    if (value === null || value === undefined) return null
    if (typeof value === "object") return null
    var str = String(value)
    if (key === "status" || key === "verification" || key === "clinical_status") {
      return str.charAt(0).toUpperCase() + str.slice(1).replace(/_/g, " ")
    }
    return str
  }

  function formatValueSummary(valueObj) {
    if (!valueObj || typeof valueObj !== "object") return []
    var lines = []
    for (var key in valueObj) {
      if (!valueObj.hasOwnProperty(key)) continue
      var value = valueObj[key]
      var label = VALUE_FIELD_LABELS[key]
      if (label === null) continue
      if (label === undefined && typeof value === "object") continue
      var displayLabel = label || (key.charAt(0).toUpperCase() + key.slice(1).replace(/_/g, " "))
      var displayValue = humanizeFieldValue(key, value)
      if (displayValue) {
        lines.push({ label: displayLabel, value: displayValue })
      }
    }
    return lines
  }

  function formatSourceReference(ref) {
    if (!ref) return null
    var match = ref.match(/^(\w+)\//)
    if (!match) return ref
    var type = match[1]
    var typeLabels = {
      Encounter: "Based on current encounter",
      Patient: "Based on patient record",
      Condition: "Based on existing condition",
      MedicationRequest: "Based on existing medication",
      AllergyIntolerance: "Based on existing allergy record",
      Observation: "Based on recorded observation",
      Procedure: "Based on procedure record",
      DiagnosticReport: "Based on diagnostic report",
    }
    return typeLabels[type] || ("Based on " + (RESOURCE_DISPLAY_NAMES[type] || type) + " record")
  }

  function formatVerificationCheck(check) {
    var info = VERIFICATION_LABELS[check.check_name] || {}
    var name = info.name || check.check_name.replace(/_/g, " ").replace(/\b\w/g, function(c) { return c.toUpperCase() })
    var passed = check.passed !== false
    var message = check.message || ""
    if (passed && info.passedMsg) {
      message = info.passedMsg
    }
    return { name: name, message: message, passed: passed }
  }

  function escapeHtml(value) {
    return String(value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;")
  }

  // ── DojoSidebarApp ──

  function DojoSidebarApp() {
    this.state = {
      phase: "ready",
      pendingManifest: null,
      patientID: null,
      encounterID: null,
      patientName: null,
      tourIndex: 0,
      tourCardHeight: 0,
      verificationResults: null,
      verificationPassed: null,
    }

    this.el = {
      statusPill: document.getElementById("status-pill"),
      statusText: document.getElementById("status-text"),
      contextLine: document.getElementById("context-line"),
      chatArea: document.getElementById("chat-area"),
      reviewPanel: document.getElementById("review-panel"),
      reviewCards: document.getElementById("review-cards"),
      reviewSummary: document.getElementById("review-summary"),
      applyAll: document.getElementById("apply-all"),
      rejectAll: document.getElementById("reject-all"),
      executeButton: document.getElementById("execute-button"),
      tourPrev: document.getElementById("tour-prev"),
      tourNext: document.getElementById("tour-next"),
      tourProgress: document.getElementById("tour-progress"),
    }
  }

  DojoSidebarApp.prototype.start = function () {
    this.bindEvents()
    this.setStatus("ready")
  }

  DojoSidebarApp.prototype.bindEvents = function () {
    var self = this
    this.el.applyAll.addEventListener("click", function () { self.bulkReview("approved") })
    this.el.rejectAll.addEventListener("click", function () { self.bulkReview("rejected") })
    this.el.executeButton.addEventListener("click", function () { self.executeManifest() })
    this.el.tourPrev.addEventListener("click", function () { self.tourNavigate(-1) })
    this.el.tourNext.addEventListener("click", function () { self.tourNavigate(1) })

    window.addEventListener("message", function (event) {
      if (!event.data || !event.data.type) return

      if (event.data.type === "dojo:setManifest") {
        self.receiveManifest(event.data)
      }
      if (event.data.type === "dojo:updateContext") {
        self.state.patientID = event.data.pid || null
        self.state.patientName = event.data.pname || null
        self.state.encounterID = event.data.encounter || null
        self.updateContextDisplay()
      }
      if (event.data.type === "dojo:clearManifest") {
        self.state.pendingManifest = null
        self.state.tourIndex = 0
        self.renderReviewPanel()
        self.setStatus("ready")
      }
      if (event.data.type === "overlay:accept") {
        self.handleInlineAction(event.data.itemId, "approved")
      }
      if (event.data.type === "overlay:reject") {
        self.handleInlineAction(event.data.itemId, "rejected")
      }
      if (event.data.type === "overlay:navigate") {
        self.tourNavigate(event.data.delta)
      }
    })
  }

  DojoSidebarApp.prototype.receiveManifest = function (data) {
    var items = data.items || []
    if (items.length === 0) {
      this.state.pendingManifest = null
      this.renderReviewPanel()
      return
    }
    for (var i = 0; i < items.length; i++) {
      if (!items[i].status) items[i].status = "pending"
    }
    this.state.pendingManifest = { items: items, patientID: data.patientID || null }
    this.state.tourIndex = data.focusIndex || 0
    this.state.tourCardHeight = 0
    this.el.reviewCards.style.minHeight = ""
    this.state.verificationResults = null
    this.state.verificationPassed = null
    this.setStatus("reviewing")
    this.renderReviewPanel()
  }

  DojoSidebarApp.prototype.setStatus = function (state) {
    this.state.phase = state
    var textMap = {
      ready: "Ready",
      reviewing: "Review Changes",
      executing: "Applying\u2026",
      error: "Error",
    }
    this.el.statusPill.dataset.state = state
    this.el.statusText.textContent = textMap[state] || textMap.ready
  }

  DojoSidebarApp.prototype.updateContextDisplay = function () {
    if (this.state.patientID) {
      var parts = [this.state.patientName || this.state.patientID]
      if (this.state.encounterID) parts.push("Enc: " + this.state.encounterID)
      this.el.contextLine.textContent = parts.join(" \u00b7 ")
    } else {
      this.el.contextLine.textContent = "No patient selected"
    }
  }

  DojoSidebarApp.prototype.postOverlayMessage = function (msg) {
    try {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage(msg, "*")
      }
    } catch (_e) {}
  }

  DojoSidebarApp.prototype.requestAllOverlays = function (items, focusIndex) {
    var patientID = this.state.patientID
    var manifest = this.state.pendingManifest
    var encounterID = this.state.encounterID || null
    this.postOverlayMessage({
      type: "overlay:applyAll",
      items: items,
      focusIndex: focusIndex || 0,
      patientID: patientID,
      encounterID: encounterID,
    })
  }

  DojoSidebarApp.prototype.isInPageResource = function (resourceType) {
    var supported = ["Condition", "AllergyIntolerance", "MedicationRequest", "Encounter", "SoapNote", "Procedure"]
    return supported.indexOf(resourceType) !== -1
  }

  // ── Review panel rendering (faithful copy from sidebar.js) ──

  DojoSidebarApp.prototype.renderReviewPanel = function () {
    var manifest = this.state.pendingManifest
    if (!manifest || !Array.isArray(manifest.items) || manifest.items.length === 0) {
      this.el.reviewPanel.classList.add("hidden")
      this.postOverlayMessage({ type: "overlay:clear" })
      return
    }

    this.el.reviewPanel.classList.remove("hidden")
    var total = manifest.items.length
    var idx = Math.max(0, Math.min(this.state.tourIndex, total - 1))
    this.state.tourIndex = idx

    this.el.tourProgress.textContent = (idx + 1) + " of " + total
    this.el.tourPrev.disabled = idx === 0
    this.el.tourNext.disabled = idx === total - 1

    if (!this.state.tourCardHeight) {
      this.measureMaxCardHeight(manifest.items)
    }

    this.renderTourCard(manifest.items[idx])
    this.requestAllOverlays(manifest.items, idx)

    var approved = 0, rejected = 0, pending = 0
    for (var i = 0; i < manifest.items.length; i++) {
      var s = manifest.items[i].status
      if (s === "approved") approved++
      else if (s === "rejected") rejected++
      else pending++
    }

    if (this.state.verificationPassed === false) {
      this.el.reviewSummary.innerHTML = ""
      var warn = document.createElement("div")
      warn.className = "verification-summary"
      warn.textContent = "\u26a0 Verification failed \u2014 resolve errors before executing"
      this.el.reviewSummary.appendChild(warn)
      this.el.executeButton.disabled = true
    } else {
      if (this.state.verificationPassed === true) {
        this.el.reviewSummary.innerHTML = ""
        var ok = document.createElement("div")
        ok.className = "verification-summary all-passed"
        ok.textContent = "\u2713 All checks passed \u00b7 " + approved + " to apply, " + rejected + " rejected, " + pending + " pending"
        this.el.reviewSummary.appendChild(ok)
      } else {
        this.el.reviewSummary.textContent = approved + " to apply, " + rejected + " rejected, " + pending + " pending"
      }
      this.el.executeButton.disabled = false
      this.el.executeButton.textContent = approved > 0 ? "Execute Changes" : "Discard All"
    }
  }

  DojoSidebarApp.prototype.renderTourCard = function (item) {
    this.el.reviewCards.innerHTML = ""
    var card = document.createElement("article")
    card.className = "review-card"
    if (item.status === "approved" || item.status === "rejected") {
      card.classList.add("status-" + item.status)
    }

    var actionIcons = { create: "+", update: "\u270e", delete: "\u2715" }
    var header = document.createElement("div")
    header.className = "review-card-header"

    var icon = document.createElement("span")
    icon.className = "review-card-action-icon action-" + item.action
    icon.textContent = actionIcons[item.action] || "?"
    header.appendChild(icon)

    var actionLabel = ACTION_LABELS[item.action] || item.action
    var resourceLabel = RESOURCE_DISPLAY_NAMES[item.resource_type] || item.resource_type
    var title = document.createElement("strong")
    title.textContent = actionLabel + " " + resourceLabel
    header.appendChild(title)

    var statusBadge = document.createElement("span")
    statusBadge.className = "review-card-status badge-" + item.status
    statusBadge.textContent = item.status
    header.appendChild(statusBadge)

    if (item.confidence && item.confidence !== "high") {
      var conf = document.createElement("span")
      conf.className = "confidence-badge confidence-" + item.confidence
      conf.textContent = item.confidence === "low" ? "\u26a0 Needs review" : "Review suggested"
      header.appendChild(conf)
    }

    card.appendChild(header)

    var desc = document.createElement("div")
    desc.className = "review-card-description"
    desc.textContent = item.description || "No description"
    card.appendChild(desc)

    if (!this.isInPageResource(item.resource_type)) {
      var note = document.createElement("div")
      note.className = "review-card-sidebar-note"
      note.textContent = "Cannot preview in-page \u2014 review details here."
      card.appendChild(note)
    }

    if (item.current_value && (item.action === "update" || item.action === "delete")) {
      var currentLines = formatValueSummary(item.current_value)
      if (currentLines.length > 0) {
        var section = document.createElement("div")
        section.className = "review-card-section"
        var label = document.createElement("div")
        label.className = "review-card-section-label"
        label.textContent = "Current"
        section.appendChild(label)
        var current = document.createElement("div")
        current.className = "review-card-current"
        current.textContent = currentLines.map(function (l) { return l.label + ": " + l.value }).join("\n")
        section.appendChild(current)
        card.appendChild(section)
      }
    }

    var proposedLines = formatValueSummary(item.proposed_value)
    var propSection = document.createElement("div")
    propSection.className = "review-card-section"
    var propLabel = document.createElement("div")
    propLabel.className = "review-card-section-label"
    propLabel.textContent = "Proposed Changes"
    propSection.appendChild(propLabel)

    if (proposedLines.length > 0) {
      var summaryDiv = document.createElement("div")
      summaryDiv.className = "review-card-value-summary"
      for (var i = 0; i < proposedLines.length; i++) {
        var line = proposedLines[i]
        var row = document.createElement("div")
        row.className = "review-card-value-row"
        var k = document.createElement("span")
        k.className = "review-card-value-label"
        k.textContent = line.label
        var v = document.createElement("span")
        v.className = "review-card-value-content"
        v.textContent = line.value
        row.appendChild(k)
        row.appendChild(v)
        summaryDiv.appendChild(row)
      }
      propSection.appendChild(summaryDiv)
    }

    card.appendChild(propSection)

    if (item.source_reference) {
      var srcDiv = document.createElement("div")
      srcDiv.className = "review-card-source"
      srcDiv.textContent = formatSourceReference(item.source_reference)
      card.appendChild(srcDiv)
    }

    var self = this
    var actions = document.createElement("div")
    actions.className = "review-card-actions"
    var applyBtn = this.makeReviewButton("Apply", "btn-sm btn-accent", function () { self.updateReviewItem(item.id, "approved") })
    var rejectBtn = this.makeReviewButton("Reject", "btn-sm btn-muted", function () { self.updateReviewItem(item.id, "rejected") })
    var undoBtn = this.makeReviewButton("Undo", "btn-sm btn-muted", function () { self.updateReviewItem(item.id, "pending") })
    if (item.status === "approved") applyBtn.classList.add("active-status")
    if (item.status === "rejected") rejectBtn.classList.add("active-status")
    actions.appendChild(applyBtn)
    actions.appendChild(rejectBtn)
    actions.appendChild(undoBtn)
    card.appendChild(actions)

    if (this.state.verificationResults && this.state.verificationResults.length > 0) {
      var itemResults = this.state.verificationResults.filter(function (r) { return r.item_id === item.id })
      if (itemResults.length > 0) {
        var checksDiv = document.createElement("div")
        checksDiv.className = "verification-checks"
        for (var j = 0; j < itemResults.length; j++) {
          var check = itemResults[j]
          var formatted = formatVerificationCheck(check)
          var checkRow = document.createElement("div")
          checkRow.className = "verification-check"

          var iconSpan = document.createElement("span")
          iconSpan.className = "verification-check-icon " + (formatted.passed ? "passed" : "failed-" + (check.severity || "error"))
          iconSpan.textContent = formatted.passed ? "\u2713" : "\u2717"
          checkRow.appendChild(iconSpan)

          var nameSpan = document.createElement("span")
          nameSpan.className = "verification-check-name"
          nameSpan.textContent = formatted.name
          checkRow.appendChild(nameSpan)

          var msgSpan = document.createElement("span")
          msgSpan.className = "verification-check-message"
          msgSpan.textContent = formatted.message
          checkRow.appendChild(msgSpan)

          checksDiv.appendChild(checkRow)
        }
        card.appendChild(checksDiv)
      }
    }

    this.el.reviewCards.appendChild(card)
  }

  DojoSidebarApp.prototype.measureMaxCardHeight = function (items) {
    this.el.reviewCards.style.visibility = "hidden"
    var maxH = 0
    for (var i = 0; i < items.length; i++) {
      this.renderTourCard(items[i])
      if (this.el.reviewCards.scrollHeight > maxH) {
        maxH = this.el.reviewCards.scrollHeight
      }
    }
    this.el.reviewCards.style.visibility = ""
    this.state.tourCardHeight = maxH
    if (maxH > 0) {
      this.el.reviewCards.style.height = maxH + "px"
    }
  }

  DojoSidebarApp.prototype.tourNavigate = function (delta) {
    var manifest = this.state.pendingManifest
    if (!manifest || !manifest.items.length) return
    var newIndex = this.state.tourIndex + delta
    if (newIndex < 0 || newIndex >= manifest.items.length) return
    this.state.tourIndex = newIndex
    this.renderReviewPanel()
  }

  DojoSidebarApp.prototype.handleInlineAction = function (itemId, status) {
    if (!this.state.pendingManifest) return
    var item = null
    for (var i = 0; i < this.state.pendingManifest.items.length; i++) {
      if (this.state.pendingManifest.items[i].id === itemId) {
        item = this.state.pendingManifest.items[i]
        break
      }
    }
    if (!item) return
    this.updateReviewItem(itemId, status)
  }

  DojoSidebarApp.prototype.updateReviewItem = function (itemID, status) {
    if (!this.state.pendingManifest) return
    for (var i = 0; i < this.state.pendingManifest.items.length; i++) {
      if (this.state.pendingManifest.items[i].id === itemID) {
        this.state.pendingManifest.items[i].status = status
        break
      }
    }
    this.renderReviewPanel()
  }

  DojoSidebarApp.prototype.bulkReview = function (status) {
    if (!this.state.pendingManifest) return
    for (var i = 0; i < this.state.pendingManifest.items.length; i++) {
      this.state.pendingManifest.items[i].status = status
    }
    this.renderReviewPanel()
  }

  DojoSidebarApp.prototype.executeManifest = function () {
    if (!this.state.pendingManifest) return
    var approved = 0
    for (var i = 0; i < this.state.pendingManifest.items.length; i++) {
      if (this.state.pendingManifest.items[i].status === "approved") approved++
    }
    this.state.pendingManifest = null
    this.renderReviewPanel()
    this.setStatus("ready")
    // Show result in chat area
    var notice = document.createElement("div")
    notice.className = "dojo-notice"
    notice.textContent = approved > 0
      ? ("\u2713 Simulated execution: " + approved + " change(s) applied.")
      : "All changes discarded."
    this.el.chatArea.appendChild(notice)
  }

  DojoSidebarApp.prototype.makeReviewButton = function (label, className, onClick) {
    var button = document.createElement("button")
    button.className = className
    button.textContent = label
    button.addEventListener("click", onClick)
    return button
  }

  // ── Boot ──

  window.addEventListener("DOMContentLoaded", function () {
    var app = new DojoSidebarApp()
    app.start()
    window._dojoSidebar = app
  })
  </script>
</body>
</html>
